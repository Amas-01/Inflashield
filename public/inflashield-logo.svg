<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Shield fill gradient -->
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0d1628"/>
    </linearGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d4941a"/>
    </linearGradient>

    <!-- Green trend gradient -->
    <linearGradient id="trendGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Shield clip -->
    <clipPath id="shieldClip">
      <path d="M80 28 L118 28 L118 88 Q118 112 80 124 Q42 112 42 88 L42 28 Z"/>
    </clipPath>

    <!-- Glow filter -->
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="480" height="160" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid texture in background -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="40" y1="0" x2="40" y2="160"/>
    <line x1="120" y1="0" x2="120" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="280" y1="0" x2="280" y2="160"/>
    <line x1="360" y1="0" x2="360" y2="160"/>
    <line x1="440" y1="0" x2="440" y2="160"/>
  </g>

  <!-- ── SHIELD MARK ── -->

  <!-- Shield outer glow -->
  <path d="M80 22 L124 22 L124 90 Q124 118 80 132 Q36 118 36 90 L36 22 Z"
        fill="none" stroke="#f5c842" stroke-width="1" opacity="0.15" filter="url(#goldGlow)"/>

  <!-- Shield body -->
  <path d="M80 26 L120 26 L120 89 Q120 114 80 127 Q40 114 40 89 L40 26 Z"
        fill="url(#shieldFill)" stroke="#2a3a5c" stroke-width="1.2"/>

  <!-- Shield border — gold -->
  <path d="M80 26 L120 26 L120 89 Q120 114 80 127 Q40 114 40 89 L40 26 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="1.8" filter="url(#goldGlow)"/>

  <!-- Inner shield notch at top -->
  <path d="M80 26 L120 26 L120 38 L80 38 L40 38 L40 26 Z"
        fill="#f5c84215"/>

  <!-- Globe grid lines inside shield (clipped) -->
  <g clip-path="url(#shieldClip)" opacity="0.22">
    <!-- Horizontal latitude lines -->
    <ellipse cx="80" cy="76" rx="34" ry="10" fill="none" stroke="#60a5fa" stroke-width="0.7"/>
    <ellipse cx="80" cy="76" rx="34" ry="22" fill="none" stroke="#60a5fa" stroke-width="0.7"/>
    <ellipse cx="80" cy="76" rx="30" ry="33" fill="none" stroke="#60a5fa" stroke-width="0.6"/>
    <!-- Vertical meridian lines -->
    <ellipse cx="80" cy="76" rx="10" ry="33" fill="none" stroke="#60a5fa" stroke-width="0.7"/>
    <ellipse cx="80" cy="76" rx="22" ry="33" fill="none" stroke="#60a5fa" stroke-width="0.7"/>
    <!-- Full circle -->
    <circle cx="80" cy="76" r="33" fill="none" stroke="#60a5fa" stroke-width="0.9"/>
  </g>

  <!-- Trend line inside shield (clipped) — the key symbol -->
  <g clip-path="url(#shieldClip)">
    <!-- Area fill under trend -->
    <path d="M48 100 L58 88 L66 92 L75 78 L84 70 L93 60 L103 50 L112 42 L112 110 L48 110 Z"
          fill="url(#trendGrad)"/>
    <!-- Trend line -->
    <polyline points="48,100 58,88 66,92 75,78 84,70 93,60 103,50 112,42"
              fill="none" stroke="#10b981" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"
              filter="url(#subtleGlow)"/>
    <!-- Terminal dot -->
    <circle cx="112" cy="42" r="3" fill="#10b981" filter="url(#subtleGlow)"/>
  </g>

  <!-- Currency symbols orbiting — floating outside shield -->
  <!-- $ -->
  <text x="22" y="52" font-family="Georgia, serif" font-size="11" font-weight="700"
        fill="#f5c842" opacity="0.6">$</text>
  <!-- € -->
  <text x="130" y="48" font-family="Georgia, serif" font-size="10" font-weight="700"
        fill="#f5c842" opacity="0.5">€</text>
  <!-- ₦ -->
  <text x="18" y="106" font-family="Georgia, serif" font-size="10" font-weight="700"
        fill="#f5c842" opacity="0.4">₦</text>
  <!-- ₺ -->
  <text x="131" y="104" font-family="Georgia, serif" font-size="10" font-weight="700"
        fill="#f5c842" opacity="0.4">₺</text>

  <!-- ── WORDMARK ── -->

  <!-- INFLA -->
  <text x="158" y="89"
        font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="-1"
        fill="#e8edf5">INFLA</text>

  <!-- SHIELD — gold -->
  <text x="290" y="89"
        font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="-1"
        fill="url(#goldGrad)"
        filter="url(#goldGlow)">SHIELD</text>

  <!-- Tagline -->
  <text x="158" y="113"
        font-family="'Trebuchet MS', sans-serif"
        font-size="12"
        font-weight="400"
        letter-spacing="3.5"
        fill="#6b7a99">ON-CHAIN INFLATION HEDGE</text>

  <!-- Subtle separator line between INFLA and SHIELD -->
  <line x1="289" y1="58" x2="289" y2="94"
        stroke="#f5c842" stroke-width="1.5" opacity="0.35"/>
</svg>
